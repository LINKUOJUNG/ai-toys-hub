<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Toys Hub 後台管理</title>
<meta name="robots" content="noindex,nofollow">
<link rel="canonical" href="https://ai-toys-hub.vercel.app/admin.html">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤖</text></svg>">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="admin-page">
<header class="site-header">
  <div class="container header-inner">
    <a href="index.html" class="logo"><span class="logo-mark">AI</span>Toys Hub</a>
    <nav class="main-nav" id="mainNav">
      <a href="index.html">首頁</a>
      <a href="products.html">商品</a>
      <a href="blog.html">部落格</a>
      <a href="admin.html" class="active">後台</a>
    </nav>
    <button class="menu-toggle" id="menuToggle">☰</button>
  </div>
</header>

<main class="admin-shell container">
  <section class="admin-hero">
    <div>
      <p class="tool-eyebrow">AI TOYS HUB ADMIN</p>
      <h1>聯盟商品卡片管理</h1>
      <p>貼上商品頁或聯盟網址，後端會抓取商品圖、標題與描述，儲存後會寫入資料檔並顯示在商品頁最前面。</p>
    </div>
    <button id="logoutBtn" class="btn-mini btn-pchome" hidden>登出</button>
  </section>

  <section id="loginPanel" class="admin-card">
    <h2>Admin 登入</h2>
    <form id="loginForm" class="admin-form compact">
      <label>管理密碼
        <input type="password" name="password" autocomplete="current-password" required>
      </label>
      <button class="btn" type="submit">登入後台</button>
    </form>
    <p class="admin-note">密碼儲存在 Vercel 環境變數，不會寫在前端程式碼。</p>
  </section>

  <section id="managerPanel" class="admin-grid" hidden>
    <form id="productForm" class="admin-card admin-form">
      <h2>新增 / 更新商品卡片</h2>
      <input type="hidden" name="id">
      <label>商品頁網址（用來抓圖片）
        <input type="url" name="url" placeholder="https://shopee.tw/product/..." required>
      </label>
      <label>聯盟連結（按鈕實際導購，可與商品頁相同）
        <input type="url" name="affiliateUrl" placeholder="https://s.shopee.tw/...">
      </label>
      <div class="admin-two-col">
        <label>分類
          <select name="category">
            <option value="robot">智能機器人</option>
            <option value="pet">AI 寵物</option>
            <option value="steam">STEAM 編程</option>
            <option value="plush">語音玩偶</option>
            <option value="drone">智能飛行</option>
            <option value="learn">AI 學習機</option>
          </select>
        </label>
        <label>標籤
          <input name="badge" value="後台新增" maxlength="12">
        </label>
      </div>
      <div class="admin-two-col">
        <label>價格（選填）
          <input name="price" placeholder="NT$ 1,280">
        </label>
        <label>原價（選填）
          <input name="oldPrice" placeholder="NT$ 1,680">
        </label>
      </div>
      <label>商品圖 URL（選填；平台擋圖時可手動貼圖片網址）
        <input type="url" name="image" placeholder="https://...jpg">
      </label>
      <label>商品標題（選填；空白時自動抓）
        <input name="title" maxlength="180">
      </label>
      <label>描述（選填；空白時自動抓）
        <textarea name="description" rows="3" maxlength="260"></textarea>
      </label>
      <div class="admin-actions">
        <button class="btn" type="submit">儲存到網站</button>
        <button class="btn-mini" type="button" id="previewBtn">先抓圖預覽</button>
        <button class="btn-mini" type="reset" id="resetBtn">清空</button>
      </div>
      <p id="formStatus" class="admin-status"></p>
    </form>

    <aside class="admin-card">
      <h2>即時預覽</h2>
      <article class="product-card admin-preview-card" id="adminPreviewCard">
        <a href="#" class="product-thumb" target="_blank" rel="nofollow sponsored noopener"><span>🤖</span></a>
        <div class="product-body">
          <div class="product-cat">智能機器人</div>
          <h3 class="product-title"><a href="#" target="_blank" rel="nofollow sponsored noopener">商品標題</a></h3>
          <p class="product-desc">商品描述會顯示在這裡。</p>
          <div class="product-meta"><span class="product-rating">★ Affiliate</span><span>admin</span></div>
          <div class="product-price-row"></div>
          <div class="product-buttons"><a href="#" class="btn-mini btn-shopee" target="_blank" rel="nofollow sponsored noopener">查看優惠</a></div>
        </div>
      </article>
    </aside>

    <section class="admin-card admin-list-card">
      <div class="admin-list-head">
        <h2>已儲存商品</h2>
        <button class="btn-mini" id="reloadBtn" type="button">重新整理</button>
      </div>
      <div id="productList" class="admin-product-list"></div>
    </section>
  </section>
</main>

<script src="assets/js/admin.js"></script>
</body>
</html>
